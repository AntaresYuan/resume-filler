name: Bug report
description: General defect report (use the Field-detection failure template for field-detection issues)
title: "[Bug] "
labels: ["type:bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One-sentence description of what happened
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: extension_version
    attributes:
      label: Extension version
      placeholder: "2.2"
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser and version
      placeholder: "Chrome 130 / Edge 130"
    validations:
      required: true
  - type: textarea
    id: console
    attributes:
      label: Console errors
      description: Relevant error stack from F12 → Console (optional)
      render: shell
