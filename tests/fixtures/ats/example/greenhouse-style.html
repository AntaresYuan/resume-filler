<!DOCTYPE html>
<html>
<head><title>Synthetic Greenhouse-style apply form</title></head>
<body>
  <h1>Apply for Senior Software Engineer at ExampleCorp</h1>
  <form>
    <div>
      <label for="first_name">First Name *</label>
      <input id="first_name" name="first_name" type="text" required>
    </div>
    <div>
      <label for="last_name">Last Name *</label>
      <input id="last_name" name="last_name" type="text" required>
    </div>
    <div>
      <label for="email">Email *</label>
      <input id="email" name="email" type="email" required>
    </div>
    <div>
      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel">
    </div>
    <div>
      <label for="linkedin">LinkedIn Profile</label>
      <input id="linkedin" name="linkedin" type="url">
    </div>
    <div>
      <label for="github">GitHub Profile</label>
      <input id="github" name="github" type="url">
    </div>
    <div>
      <label for="company">Current Company</label>
      <input id="company" name="company" type="text">
    </div>
    <div>
      <label for="title">Current Title</label>
      <input id="title" name="title" type="text">
    </div>
    <div>
      <label for="years_exp">Years of Experience</label>
      <select id="years_exp" name="years_exp">
        <option value="">Please select</option>
        <option value="0-1">Less than 1 year</option>
        <option value="1-2">1-2 years</option>
        <option value="3-5">3-5 years</option>
        <option value="6-10">6-10 years</option>
        <option value="10+">More than 10 years</option>
      </select>
    </div>
    <div>
      <label for="degree">Highest Degree</label>
      <select id="degree" name="degree">
        <option value="">Select</option>
        <option value="hs">High School</option>
        <option value="associates">Associate's Degree</option>
        <option value="bachelors">Bachelor's Degree</option>
        <option value="masters">Master's Degree</option>
        <option value="phd">Doctorate</option>
      </select>
    </div>
  </form>
</body>
</html>
